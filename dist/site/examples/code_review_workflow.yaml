name: code_review_workflow
description: A workflow for code review process

agents:
  reviewer:
    model: deepseek-r1
    system_message: "You are an expert code reviewer. Be thorough and constructive."
    tools: [read_file, grep_search]
  security:
    model: deepseek-r1
    system_message: "You are a security auditor. Focus on vulnerabilities."
    tools: [read_file, grep_search]

inputs:
  file_path: ""

outputs_dir: .cliver/workflow-runs/code_review

steps:
  - id: read_code
    name: Read Code
    type: llm
    agent: reviewer
    prompt: "Read and understand the code from file: {{ inputs.file_path }}"
    files:
      - "{{ inputs.file_path }}"
    outputs: [code_content]
    output_format: md

  - id: analyze_code
    name: Analyze Code
    type: llm
    agent: reviewer
    prompt: "Analyze the code for quality issues: {{ read_code.outputs.code_content }}"
    depends_on: [read_code]
    outputs: [analysis]
    output_format: md

  - id: security_check
    name: Security Check
    type: llm
    agent: security
    prompt: "Perform security checks on: {{ read_code.outputs.code_content }}"
    depends_on: [read_code]
    outputs: [security_report]
    output_format: md

  - id: generate_report
    name: Generate Report
    type: llm
    agent: reviewer
    prompt: |
      Generate final review report combining:
      Analysis: {{ analyze_code.outputs.analysis }}
      Security: {{ security_check.outputs.security_report }}
    depends_on: [analyze_code, security_check]
    outputs: [final_report]
    output_format: md
