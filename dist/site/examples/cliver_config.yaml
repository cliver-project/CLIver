agent_name: CLIver
default_model: deepseek-r1

providers:
  deepseek:
    type: openai
    api_url: https://api.deepseek.com/v1
    api_key: "{{ env.DEEPSEEK_API_KEY }}"
    pricing:
      currency: CNY
      input: 1.0
      output: 4.0
      cached_input: 0.25
  ollama:
    type: ollama
    api_url: http://127.0.0.1:11434

models:
  deepseek-r1:
    name_in_provider: deepseek-reasoner
    provider: deepseek
  llama3:
    name_in_provider: "llama3.2:latest"
    provider: ollama
    pricing:
      currency: USD
      input: 0.0
      output: 0.0

mcpServers:
  time:
    transport: stdio
    command: uvx
    args:
      - mcp-server-time
      - "--local-timezone=Asia/Shanghai"
