name: research_analysis
description: Research a topic and provide analysis
inputs:
  topic: "How AI will change human's life"
steps:
  - id: research_topic
    name: Research Topic
    type: llm
    prompt: "Research the topic: {{ inputs.topic }}"
    model: deepseek-r1
    outputs: [research]

  - id: analyze_findings
    name: Analyze Findings
    type: llm
    prompt: "Analyze the research findings: {{ research_topic.outputs.research }}"
    model: qwen
    outputs: [analysis]

  - id: generate_report
    name: Generate Report
    type: llm
    prompt: "Generate a final report based on: {{ analyze_findings.outputs.analysis }} for topic {{ inputs.topic }}"
    model: deepseek-r1
    outputs: [report]
