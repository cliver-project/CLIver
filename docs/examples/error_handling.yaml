name: document_processor
description: Processes documents sequentially
inputs:
  document_path: null
steps:
  - id: read_document
    name: Read Document
    type: llm
    prompt: "Read document from: {{ inputs.document_path }}"
    outputs: [content]

  - id: process_document
    name: Process Document
    type: llm
    prompt: "Process this document content: {{ read_document.outputs.content }}"
    model: deepseek-r1
    outputs: [processed_content]
