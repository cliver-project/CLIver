name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "admin/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: make init

      - name: Run code lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Install admin dependencies
        run: make admin-install

      - name: Lint admin portal
        run: make admin-lint

      - name: Build admin portal
        run: make admin-build
